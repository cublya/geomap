name: Deploy documentation to GitHub Pages

# Deploys only from the default branch — pull requests are tested by ci.yml and
# never deploy.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build Storybook and long-form documentation
        run: npm run build-site
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/docs/
          STORYBOOK_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
