name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npx publint
      - run: npm pack --dry-run
      - run: npm run build-storybook

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Storybook interaction & accessibility tests
        run: npm run test-storybook:ci

      - name: Playwright screenshot tests
        # "missing" bootstraps baselines for a platform that has none committed
        # (snapshots are platform-suffixed) and compares against existing ones.
        run: npx playwright test --update-snapshots=missing
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Fixture installs (Vite + Next.js) from packed tarball
        run: bash scripts/verify-fixtures.sh
